<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hier deine Kunst</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0;
            /* Hier ist jetzt dein exakter Bildname eingetragen */
            background: url('IMG_20260609_210917.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #cfd8dc;
            font-family: 'Playfair Display', serif;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
            position: relative;
        }

        /* Ein dunkler Schleier über dem Bild, damit der Text perfekt lesbar bleibt */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 15, 20, 0.5);
            z-index: 0;
            pointer-events: none;
        }

        .art-card {
            position: relative;
            z-index: 1;
            max-width: 600px;
            width: 85%;
            padding: 45px 25px;
            background: rgba(13, 17, 23, 0.75);
            border-radius: 20px;
            border: 1px solid rgba(255, 202, 40, 0.2);
            box-shadow: 
                0 25px 50px rgba(0,0,0,0.8), 
                inset 0 0 20px rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        h1 { 
            font-family: 'Cinzel Decorative', serif; 
            font-size: 2.3rem; 
            color: #ffca28; 
            margin-top: 0;
            margin-bottom: 25px; 
            line-height: 1.3;
            letter-spacing: 1px;
            text-shadow: 0 0 15px rgba(255, 202, 40, 0.4), 2px 2px 4px rgba(0,0,0,0.9);
        }

        p { 
            font-size: 1.3rem; 
            font-style: italic; 
            line-height: 1.8; 
            color: #f0f4f8; 
            margin: 0 0 40px 0;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        .back-btn { 
            display: inline-block;
            padding: 14px 30px; 
            color: #ffca28; 
            text-decoration: none; 
            border: 1px solid #ffca28; 
            border-radius: 8px; 
            font-size: 1rem;
            letter-spacing: 1px;
            background: rgba(255, 202, 40, 0.03);
            transition: all 0.3s ease; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .back-btn:hover { 
            background: rgba(255, 202, 40, 0.1);
            border-color: #ffe082;
            color: #ffe082;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 202, 40, 0.3);
        }
    </style>
</head>
<body>

    <div class="art-card">
        <h1>Hier deine Kunst</h1>
        
        <p>
            Der Ort, an dem deine Kreativität keine Grenzen kennt. <br>
            Jede Linie, jede Farbe und jedes Design ist ein Teil deiner eigenen Welt – bereit, hier gesehen zu werden.
        </p>
        
        <a href="index.html" class="back-btn">Zurück zur Startseite</a>
    </div>

</body>
</html>
