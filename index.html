        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #060b11 0%, #11161d 100%);
            color: #cfd8dc;
            font-family: 'Playfair Display', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow-x: hidden;
        }

        .container {
            max-width: 600px;
            width: 85%;
            padding: 80px 20px 40px 20px; /* Erzeugt den Abstand nach oben, blockiert aber nichts! */
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-sizing: border-box;
        }

        .nav-btn {
            display: block;
            width: 100%;
            padding: 20px;
            margin: 15px 0;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #f0f4f8;
            text-decoration: none;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .nav-btn:hover {
            background: rgba(255, 202, 40, 0.08);
            border-color: #ffca28;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .nav-btn.highlight {
            background: rgba(255, 202, 40, 0.04);
            border-color: rgba(255, 202, 40, 0.3);
        }
        .nav-btn.highlight:hover {
            background: rgba(255, 202, 40, 0.12);
            border-color: #ffca28;
        }

        .footer {
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .footer h3 {
            font-family: 'Cinzel Decorative', serif;
            font-size: 0.9rem;
            letter-spacing: 2px;
            color: #b0bec5;
            margin-bottom: 15px;
        }

        .footer p {
            font-size: 1.1rem;
            font-style: italic;
            line-height: 1.7;
            color: #90a4ae;
            margin: 0 0 25px 0;
        }

        .social-icons {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            height: 40px;
        }

        .social-link {
            display: inline-block;
            color: #b0bec5;
            font-size: 1.8rem;
            margin: 0 20px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            color: #ffca28;
            transform: scale(1.15);
            text-shadow: 0 0 10px rgba(255, 202, 40, 0.4);
        }

        .secret-trigger {
            position: absolute;
            right: 0;
            cursor: pointer;
            font-size: 1.4rem;
            transition: all 0.3s ease;
            user-select: none;
            opacity: 0.6;
            z-index: 10; /* Erhöht, damit er garantiert über allem anderen liegt */
            padding: 10px; /* Macht den Klickbereich etwas größer */
        }
        .secret-trigger:hover {
            transform: scale(1.3) rotate(15deg);
            opacity: 1;
            text-shadow: 0 0 10px #ffca28;
        }

        /* POP-UP OVERLAY */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4, 7, 12, 0.96);
            backdrop-filter: blur(10px);
            z-index: 100; /* Weit über dem Rest */
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .parchment {

            color: #2b1d0c;
            width: 85%;
            max-width: 450px;
            padding: 40px 30px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7), inset 0 0 40px #dfd09d;
            border: 2px solid #c5b47f;
            position: relative;
            transform: scale(0.7) translateY(30px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            font-family: 'Playfair Display', serif;
            text-align: center;
            z-index: 102;
        }

        .overlay.active .parchment {
            transform: scale(1) translateY(0);
        }
