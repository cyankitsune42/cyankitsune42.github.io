<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- GEHEIM: Steuert weiterhin NUR die diskrete Vorschau bei WhatsApp -->
    <title>Cyan Kitsune</title>
    <meta name="description" content="Künstlerisches Portfolio von Cyan Kitsune">
    <meta property="og:title" content="Cyan Kitsune">
    <meta property="og:description" content="Künstlerisches Portfolio und kreative Projekte.">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <!-- FontAwesome für die Social-Media-Icons laden -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            margin: 0; padding: 0;
            background: linear-gradient(to bottom, #060b11 0%, #11161d 100%);
            color: #cfd8dc;
            font-family: 'Playfair Display', serif;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
        }

        .container {
            max-width: 600px;
            width: 85%;
            padding: 40px 20px;
        }

        .main-title {
            font-family: 'Cinzel Decorative', serif;
            font-size: 2.1rem;
            color: #ffca28;
            margin-bottom: 5px;
            letter-spacing: 2px;
            line-height: 1.2;
            text-shadow: 0 0 15px rgba(255, 202, 40, 0.3);
            white-space: nowrap;
        }

        /* Komplett angepasst: Jetzt im exakt selben Look wie die Hauptüberschrift */
        .subtitle {
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.4rem;
            color: #ffca28;
            margin-top: 10px;
            margin-bottom: 40px;
            letter-spacing: 1px;
            line-height: 1.2;
            text-shadow: 0 0 12px rgba(255, 202, 40, 0.3);
            white-space: nowrap;
        }

        .nav-btn {
            display: block;
            width: 100%;
            padding: 20px;
            margin: 15px 0;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #f0f4f8;
            text-decoration: none;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .nav-btn:hover {
            background: rgba(255, 202, 40, 0.08);
            border-color: #ffca28;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Highlight-Button */
        .nav-btn.highlight {
            background: rgba(255, 202, 40, 0.04);
            border-color: rgba(255, 202, 40, 0.3);
        }
        .nav-btn.highlight:hover {
            background: rgba(255, 202, 40, 0.12);
            border-color: #ffca28;
        }

        .footer {
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .footer h3 {
            font-family: 'Cinzel Decorative', serif;
            font-size: 0.9rem;
            letter-spacing: 2px;
            color: #b0bec5;
            margin-bottom: 15px;
        }

        .footer p {
            font-size: 1.1rem;
            font-style: italic;
            line-height: 1.7;
            color: #90a4ae;
            margin: 0 0 25px 0;
        }

        /* Social Media Icons */
        .social-icons {
            margin-top: 15px;
        }

        .social-link {
            display: inline-block;
            color: #b0bec5;
            font-size: 1.8rem;
            margin: 0 20px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            color: #ffca28;
            transform: scale(1.15);
            text-shadow: 0 0 10px rgba(255, 202, 40, 0.4);
        }

        /* Optimierung für kleinere Displays */
        @media (max-width: 380px) {
            .main-title { font-size: 1.8rem; }
            .subtitle { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="main-title">HAPPY BIRTHDAY</h1>
        <!-- Text in Großbuchstaben umgewandelt für den perfekten Look der Schriftart -->
        <div class="subtitle">PRINZESSIN (29 + 1)</div>

        <a href="buecher.html" class="nav-btn highlight">Hier könnten deine Bücher sein</a>
        <a href="gedichte.html" class="nav-btn">Hier könnten deine Gedichte sein</a>
        <a href="kunst.html" class="nav-btn">Hier deine Kunst</a>

        <div class="footer">
            <h3>IMPRESSUM</h3>
            <p>
                Manchmal rational aber unglaublich stolz auf dich und deinen Ehrgeiz. <br>
                Lass mich Rückenwind sein, für alles was vor dir liegt.
            </p>
            
            <div class="social-icons">
                <a href="https://www.instagram.com/cyankitsune42" target="_blank" class="social-link" title="Instagram">
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="https://www.tiktok.com/@cyan.kitsune" target="_blank" class="social-link" title="TikTok">
                    <i class="fab fa-tiktok"></i>
                </a>
            </div>
        </div>
    </div>

</body>
</html>
