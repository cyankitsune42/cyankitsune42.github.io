<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday | cyankitsune42</title>
    <!-- Einbinden der Harry-Potter-ähnlichen Schriftart von Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        /* Grunddesign & Magische Partikel im Hintergrund */
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #1a2a3a 0%, #0d1520 100%);
            color: #f5f6f7;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Schwebender Sternenstaub-Effekt */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
            opacity: 0.15;
            animation: floatingParticles 60s linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes floatingParticles {
            from { background-position: 0 0, 40px 60px; }
            to { background-position: 550px 1100px, 350px 700px; }
        }

        .container {
            max-width: 800px;
            width: 90%;
            text-align: center;
            z-index: 1;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        /* Alter-Anzeige (29+1) */
        .age-badge {
            font-family: 'Cinzel Decorative', serif;
            font-size: 2.2rem;
            color: #00d2ff;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.6);
            margin-top: 20px;
            letter-spacing: 3px;
            animation: pulse 2s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.05); opacity: 1; text-shadow: 0 0 25px rgba(0, 210, 255, 0.9); }
        }

        /* Harry Potter Schriftstil für die Hauptüberschrift */
        .potter-title {
            font-family: 'Cinzel Decorative', serif;
            font-size: 2.8rem;
            color: #ffca28;
            margin: 15px 0 5px 0;
            line-height: 1.3;
            letter-spacing: 2px;
            text-shadow: 
                0 0 10px rgba(255, 202, 40, 0.5),
                0 0 20px rgba(255, 202, 40, 0.3),
                2px 2px 4px rgba(0,0,0,0.8);
        }

        .sub-title {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.3rem;
            color: #b0bec5;
            margin-bottom: 50px;
        }

        /* Interaktive Buttons mit verschiedenen Hintergründen bei Hover */
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin: 40px 0;
        }

        .magic-button {
            position: relative;
            padding: 24px 30px;
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            font-weight: 700;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.5s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-decoration: none;
            display: block;
        }

        /* Unsichtbarer Hintergrund, der sich beim Hover weich einblendet */
        .magic-button::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            transition: opacity 0.6s ease;
            z-index: -1;
        }

        /* 1. BUTTON: BÜCHER (Gemütlich, Leder/Papier-Vibe) */
        .btn-books:hover {
            border-color: #d7ccc8;
            box-shadow: 0 0 25px rgba(215, 204, 200, 0.4);
            transform: translateY(-3px);
        }
        .btn-books::before {
            background: linear-gradient(135deg, rgba(78, 52, 46, 0.85), rgba(43, 27, 23, 0.95));
        }

        /* 2. BUTTON: GEDICHTE (Poetisch, Neblig/Nächtlich) */
        .btn-poems:hover {
            border-color: #b3e5fc;
            box-shadow: 0 0 25px rgba(179, 229, 252, 0.4);
            transform: translateY(-3px);
        }
        .btn-poems::before {
            background: linear-gradient(135deg, rgba(38, 50, 56, 0.85), rgba(13, 71, 161, 0.9));
        }

        /* 3. BUTTON: KUNST (Einfältig/Minimalistisch, sanfter Studio-Farbton) */
        .btn-art:hover {
            border-color: #cfd8dc;
            box-shadow: 0 0 25px rgba(207, 216, 220, 0.3);
            transform: translateY(-3px);
        }
        .btn-art::before {
            background: linear-gradient(135deg, rgba(55, 71, 79, 0.85), rgba(38, 50, 56, 0.95));
        }

        /* Aktiviert den Hintergrund-Effekt bei Berührung/Hover */
        .magic-button:hover::before {
            opacity: 1;
        }

        .magic-button span {
            position: relative;
            z-index: 2;
            letter-spacing: 1px;
        }

        /* Impressum Style mit deinem persönlichen Text */
        footer {
            margin-top: auto;
            padding: 40px 20px;
            width: 100%;
            box-sizing: border-box;
            background: rgba(5, 10, 15, 0.6);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .impressum-title {
            font-family: 'Playfair Display', serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #546e7a;
            margin-bottom: 10px;
        }

        .impressum-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.1rem;
            color: #cfd8dc;
            max-width: 550px;
            margin: 0 auto;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Das "magische" Alter -->
        <div class="age-badge">29+1</div>

        <!-- Die Harry-Potter-Style Geburtstagsüberschrift -->
        <h1 class="potter-title">Alles Gute zum Geburtstag</h1>
        <div class="sub-title">Prinzessin</div>

        <!-- Die 3 interaktiven Platzhalter-Buttons -->
        <div class="button-container">
            
            <a href="#buecher" class="magic-button btn-books">
                <span>Hier könnten deine Bücher sein</span>
            </a>

            <a href="#gedichte" class="magic-button btn-poems">
                <span>Hier könnten deine Gedichte sein</span>
            </a>

            <a href="#kunst" class="magic-button btn-art">
                <span>Hier deine Kunst</span>
            </a>

        </div>
    </div>

    <!-- Dein ganz persönliches Impressum im Fußbereich -->
    <footer>
        <div class="impressum-title">Impressum</div>
        <p class="impressum-text">
            Manchmal rational aber unglaublich stolz auf dich und deinen Ehrgeiz. Lass mich Rückenwind sein, für alles was vor dir liegt.
        </p>
    </footer>

</body>
</html>
