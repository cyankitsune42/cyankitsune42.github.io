<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Cyan Kitsune</title>
    <meta name="description" content="Künstlerisches Portfolio von Cyan Kitsune">
    <meta property="og:title" content="Cyan Kitsune">
    <meta property="og:description" content="Künstlerisches Portfolio und kreative Projekte.">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            margin: 0; padding: 0;
            background: linear-gradient(to bottom, #060b11 0%, #11161d 100%);
            color: #cfd8dc;
            font-family: 'Playfair Display', serif;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
            overflow-x: hidden;
        }

        .container {
            max-width: 600px;
            width: 85%;
            padding: 40px 20px;
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Platzhalter für den fehlenden Titel, damit die Buttons nicht am oberen Rand kleben */
        .spacer {
            height: 60px;
        }

        .nav-btn {
            display: block;
            width: 100%;
            padding: 20px;
            margin: 15px 0;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #f0f4f8;
            text-decoration: none;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .nav-btn:hover {
            background: rgba(255, 202, 40, 0.08);
            border-color: #ffca28;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .nav-btn.highlight {
            background: rgba(255, 202, 40, 0.04);
            border-color: rgba(255, 202, 40, 0.3);
        }
        .nav-btn.highlight:hover {
            background: rgba(255, 202, 40, 0.12);
            border-color: #ffca28;
        }

        .footer {
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .footer h3 {
            font-family: 'Cinzel Decorative', serif;
            font-size: 0.9rem;
            letter-spacing: 2px;
            color: #b0bec5;
            margin-bottom: 15px;
        }

        .footer p {
            font-size: 1.1rem;
            font-style: italic;
            line-height: 1.7;
            color: #90a4ae;
            margin: 0 0 25px 0;
        }

        .social-icons {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            height: 40px;
        }

        .social-link {
            display: inline-block;
            color: #b0bec5;
            font-size: 1.8rem;
            margin: 0 20px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            color: #ffca28;
            transform: scale(1.15);
            text-shadow: 0 0 10px rgba(255, 202, 40, 0.4);
        }

        .secret-trigger {
            position: absolute;
            right: 0;
            cursor: pointer;
            font-size: 1.4rem;
            transition: all 0.3s ease;
            user-select: none;
            opacity: 0.6;
            z-index: 5;
        }
        .secret-trigger:hover {
            transform: scale(1.3) rotate(15deg);
            opacity: 1;
            text-shadow: 0 0 10px #ffca28;
        }

        /* MAGISCHES POP-UP */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4, 7, 12, 0.96);
            backdrop-filter: blur(10px);
            z-index: 10;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.6s ease;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Pergament-Look */
        .parchment {
            background: #f4eccf;
            background-image: radial-gradient(rgba(0,0,0,0.05) 15%, transparent 20%), radial-gradient(rgba(0,0,0,0.05) 15%, transparent 20%);
            background-size: 4px 4px;
            color: #2b1d0c;
            width: 85%; max-width: 450px;
            padding: 40px 30px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7), inset 0 0 40px #dfd09d;
            border: 2px solid #c5b47f;
            position: relative;
            transform: scale(0.7) translateY(30px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            font-family: 'Playfair Display', serif;
            text-align: center;
            z-index: 12;
        }

        .overlay.active .parchment {
            transform: scale(1) translateY(0);
        }

        /* Vollbild-Modus für das Bild */
        .parchment.map-open {
            max-width: 100vw;
            width: 100vw;
            height: 100vh;
            max-height: 100vh;
            border-radius: 0;
            border: none;
            padding: 20px 0 0 0;
            margin: 0;
            background: #04070c;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            box-shadow: none;
            transform: scale(1) translateY(0);
            box-sizing: border-box;
        }

        .parchment h2 {
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.3rem;
            color: #5d4037;
            border-bottom: 1px dashed #bcaaa4;
            padding-bottom: 15px;
            margin-top: 0;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        /* Der dorthin verschobene Titel */
        .overlay-birthday-title {
            display: none;
            font-family: 'Cinzel Decorative', serif;
            color: #ffca28;
            text-shadow: 0 0 15px rgba(255, 202, 40, 0.5);
            margin: 20px 0 5px 0;
            padding: 0 15px;
            z-index: 14;
            animation: fadeInTitle 1s ease forwards;
        }
        
        .overlay-birthday-title h1 {
            font-size: 1.8rem;
            margin: 0;
            letter-spacing: 2px;
        }
        .overlay-birthday-title p {
            font-size: 1.2rem;
            margin: 5px 0 0 0;
            letter-spacing: 1px;
            color: #ffca28;
        }

        @keyframes fadeInTitle {
            0% { opacity: 0; transform: translateY(-10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .parchment p {
            font-size: 1.2rem;
            line-height: 1.8;
            font-style: italic;
            color: #3e2723;
            margin-bottom: 0;
        }

        .lumos-link {
            display: inline-block;
            margin-top: 30px;
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.4rem;
            color: #795548;
            text-decoration: none;
            cursor: pointer;
            letter-spacing: 3px;
            font-weight: bold;
            transition: all 0.4s ease;
            padding: 5px 15px;
        }
        .lumos-link:hover {
            color: #ffca28;
            text-shadow: 0 0 15px #ffca28;
            letter-spacing: 6px;
        }

        /* Das fertige Bild aus deinem Repository */
        .marauders-map-img {
            display: none;
            width: 100%;
            height: calc(100vh - 120px);
            max-width: 100vw;
            object-fit: contain;
            animation: mapAppear 1.2s ease forwards;
            margin-top: 10px;
        }

        @keyframes mapAppear {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #8d6e63;
            transition: color 0.3s;
            z-index: 15;
        }
        .close-btn:hover { color: #5d4037; }
        .parchment.map-open .close-btn { color: #ffffff; text-shadow: 0 0 10px rgba(0,0,0,0.8); font-size: 2.2rem; top: 15px; right: 25px; }

        /* PARTIKEL */
        .particle {
            position: fixed;
            background: radial-gradient(circle, rgba(255,236,179,1) 0%, rgba(255,202,40,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 13;
            animation: floatUp var(--duration) ease-in-out infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(105vh) translateX(0) scale(0.5); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-10vh) translateX(var(--drift)) scale(1.2); opacity: 0; }
        }

        /* PATRONUS EFFEKT */
        .patronus-spirit {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.2);
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(240,253,255,1) 0%, rgba(144,224,239,0.7) 35%, rgba(0,180,216,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 11;
            opacity: 0;
            filter: blur(10px);
            box-shadow: 0 0 60px 40px rgba(0, 180, 216, 0.5), inset 0 0 40px 20px rgba(255,255,255,0.9);
        }

        .patronus-active {
            animation: patronusErupt 2.2s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }
